# ============================================================
# aihealz.com — High-Performance Nginx Configuration
# Hostinger VPS: Brotli + HTTP/2 + Edge Caching + Security
# ============================================================

# ── Upstream: Next.js application ───────────────────────────
upstream nextjs_upstream {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ── Rate limiting zones ────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=100r/s;

# ── Redirect HTTP → HTTPS ──────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name aihealz.com www.aihealz.com;
    return 301 https://aihealz.com$request_uri;
}

# ── Redirect www → non-www ─────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.aihealz.com;

    ssl_certificate     /etc/letsencrypt/live/aihealz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aihealz.com/privkey.pem;

    return 301 https://aihealz.com$request_uri;
}

# ── Main server block ──────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aihealz.com;

    # ── SSL Configuration ───────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/aihealz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aihealz.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!3DES;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;

    # ── Brotli Compression ──────────────────────────────
    brotli on;
    brotli_comp_level 6;
    brotli_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        font/ttf
        font/opentype
        font/woff
        font/woff2
        image/svg+xml;

    # Gzip fallback for clients that don't support Brotli
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/rss+xml application/atom+xml
        font/ttf font/opentype font/woff font/woff2
        image/svg+xml;

    # ── Security Headers ────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=(self)" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://api.openai.com https://api.indexnow.org https://indexing.googleapis.com; frame-src 'self' https://daily.co;" always;

    # ── Static Asset Caching ────────────────────────────
    # Next.js hashed assets — cache for 1 year
    location /_next/static/ {
        proxy_pass http://nextjs_upstream;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Favicon and manifest
    location ~* \.(ico|webmanifest)$ {
        proxy_pass http://nextjs_upstream;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # Images and fonts
    location ~* \.(jpg|jpeg|png|gif|webp|avif|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://nextjs_upstream;
        expires 90d;
        add_header Cache-Control "public, max-age=7776000";
        access_log off;
    }

    # ── Sitemap & Robots — Edge cached ──────────────────
    location ~* ^/sitemap.*\.xml$ {
        proxy_pass http://nextjs_upstream;
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, s-maxage=3600, stale-while-revalidate=1800";
    }

    location = /robots.txt {
        proxy_pass http://nextjs_upstream;
        proxy_cache_valid 200 24h;
        add_header Cache-Control "public, s-maxage=86400";
    }

    # ── API Routes — Rate limited ───────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # No caching for API
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Condition + City pages — Edge cached ────────────
    # These are the highest-value SEO pages
    location ~* ^/[a-z]{2,}/[a-z-]+/[a-z-]+/[a-z-]+$ {
        limit_req zone=general burst=50 nodelay;
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Edge caching: 10 min at edge, stale for 1 hour
        add_header Cache-Control "public, s-maxage=600, stale-while-revalidate=3600";
        add_header X-Cache-Status "HIT-EDGE";
    }

    # ── Doctor profile pages — Short cache ──────────────
    location ~* ^/doctor/[a-z0-9-]+$ {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "public, s-maxage=300, stale-while-revalidate=600";
    }

    # ── Default — All other routes ──────────────────────
    location / {
        limit_req zone=general burst=50 nodelay;
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        add_header Cache-Control "public, s-maxage=60, stale-while-revalidate=300";
    }

    # ── Error pages ─────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/html;
        internal;
    }

    # Block common attack paths
    location ~* \.(env|git|svn|bak|old|sql|log)$ {
        deny all;
        return 404;
    }

    location ~ /\. {
        deny all;
        return 404;
    }
}
